<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
     <script src="https://cdn.tailwindcss.com"></script>
    <title>systeme de crud avec la barre de filitrage</title>
</head>
<body class="bg-[#eff1f2]">
   <nav class="bg-slate-800 text-white px-6 py-4 flex justify-between items-center shadow">
        <h1 class="text-xl font-bold">Mes Exercices</h1>
        <ul class="flex gap-6">
            <li>
                <a href="EX.HTML" class="hover:text-sky-400 transition">Exercice 1</a>
            </li>
            <li>
                <a href="exercice2.html" class="hover:text-sky-400 transition">Exercice 2</a>
            </li>
        </ul>
    </nav>
  <div class=" m-16 flex justify-between">
    <div>
      <a href="">retour</a>
    </div>
    <div class="bg-[#2a2af9] w-[8%] h-[4vh] text-center pt-2 cursor-pointer">
      <button class="text-white cursor-pointer" id="ajouter">ajouter</button>
    </div>
  </div>
  <div class="grid grid-cols-1">
      <!-- barre de recherche pour le filtrage -->
    <div class="mt-8 text-center ">
        <input type="text" id="filtrage" value="" placeholder="chercher un etudiant" class="w-[50%] h-[5vh] rounded-full">
    </div>
    <div class="m-16 grid grid-cols-1">

    <!-- FORMULAIRE -->
    <form id="formulaire" class="mt-6 hidden">
      <div class="bg-white rounded-xl p-6 shadow ">

        <h1 class="text-2xl font-bold text-center mb-6">Ajouter un Étudiant</h1>

      
        <div class="flex flex-col gap-1 mb-4">
          <p class="text-sm font-bold text-gray-500 uppercase tracking-wide">Nom</p>
          <input type="text" id="nom" placeholder="votre nom"
                 class="bg-[#fafaf9] border border-gray-200 rounded-lg w-full h-[5vh] px-3
                        focus:outline-none focus:ring-2 focus:ring-blue-400">
        </div>

     
        <div class="flex flex-col gap-1 mb-4">
          <p class="text-sm font-bold text-gray-500 uppercase tracking-wide">Prénom</p>
          <input type="text" id="prenom" placeholder="votre prénom"
                 class="bg-[#fafaf9] border border-gray-200 rounded-lg w-full h-[5vh] px-3
                        focus:outline-none focus:ring-2 focus:ring-blue-400">
        </div>

     
        <div class="flex flex-col gap-1 mb-6">
          <p class="text-sm font-bold text-gray-500 uppercase tracking-wide">Age</p>
          <input type="text" id="age" placeholder="votre adresse"
                 class="bg-[#fafaf9] border border-gray-200 rounded-lg w-full h-[5vh] px-3
                        focus:outline-none focus:ring-2 focus:ring-blue-400">
        </div>

      
        <input type="submit" onclick="valider()" value="Valider" id="btn-2"
               class="bg-blue-500 hover:bg-blue-600 w-full h-[5vh] rounded-lg
                      text-white font-bold cursor-pointer transition duration-200">
      </div>
    </form>
                          <!-- formulaire pour modifier -->
     <div id="formulaireModification" class="fixed inset-0 bg-black bg-opacity-50 hidden
                           flex items-center justify-center z-50">
        <div class="bg-white rounded-2xl p-6 w-full max-w-md shadow-xl">
            <h2 class="text-xl font-bold text-gray-800 mb-4">
                 Modifier l'étudiant
            </h2>
 
            <div class="flex flex-col gap-4">
                <div class="flex flex-col gap-1">
                    <label class="text-sm font-bold text-gray-500 uppercase">Nom</label>
                    <input type="text" id="modif-nom"
                           class="bg-gray-50 border border-gray-200 rounded-xl px-4 py-3
                                  focus:outline-none focus:ring-2 focus:ring-blue-400"/>
                </div>
                <div class="flex flex-col gap-1">
                    <label class="text-sm font-bold text-gray-500 uppercase">Prénom</label>
                    <input type="text" id="modif-prenom"
                           class="bg-gray-50 border border-gray-200 rounded-xl px-4 py-3
                                  focus:outline-none focus:ring-2 focus:ring-blue-400"/>
                </div>
                <div class="flex flex-col gap-1">
                    <label class="text-sm font-bold text-gray-500 uppercase">Age</label>
                    <input type="number" id="modif-age"
                           class="bg-gray-50 border border-gray-200 rounded-xl px-4 py-3
                                  focus:outline-none focus:ring-2 focus:ring-blue-400"/>
                </div>
            </div>
 
            <div class="flex gap-3 mt-6">
                <button onclick="fermerModification()"
                        class="flex-1 border border-gray-200 text-gray-500 font-bold
                               py-3 rounded-xl hover:bg-gray-50 transition">
                    Annuler
                </button>
                <button onclick="enregistrerModif()"
                        class="flex-1 bg-blue-500 text-white font-bold
                               py-3 rounded-xl hover:bg-blue-600 transition">
                    Enregistrer
                </button>
            </div>
        </div>
    </div>

    <!-- TABLEAU -->
    <div class="bg-white mt-6 rounded-xl shadow overflow-x-auto">
      <table class="table-auto w-full">
        <thead>
          <tr class="bg-gray-50">
            <th class="border border-gray-200 px-4 py-3 text-sm text-gray-500 w-[10%]">id unique de chaque etudiant</th>
            <th class="border border-gray-200 px-4 py-3 text-sm text-gray-500">Nom</th>
            <th class="border border-gray-200 px-4 py-3 text-sm text-gray-500">Prénom</th>
            <th class="border border-gray-200 px-4 py-3 text-sm text-gray-500">Age</th>
            <th class="border border-gray-200 px-4 py-3 text-sm text-gray-500">Action</th>
          </tr>
        </thead>
        <tbody id="liste"></tbody>
      </table>
    </div>

  <div class="m-16 flex justify-between">
    <div class="bg-[#4813f7] text-white w-[15%] text-center rounded-md cursor-pointer">
     <button id="precedent" class="cursor-pointer">precedent</button>
    </div>
    <div class="">
      <p id="nombrepage"></p>
    </div>
    <div class="bg-[#4813f7] text-white w-[15%] text-center rounded-md cursor-pointer">
     <button id="suivant" class="cursor-pointer">suivant</button>
    </div>

  </div>

  </div>
  </div>
    
</body>
<script src="exo2.js"></script>
</html>
